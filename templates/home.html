<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Predictor</title>
    <style>
        /* Colorful Gradient Background */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .card { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 2rem; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 450px; 
        }

        /* Image Styling */
        .header-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        h2 { text-align: center; color: #4a148c; margin-bottom: 1.5rem; }

        .form-group { margin-bottom: 1.2rem; }
        
        label { font-weight: 600; color: #555; display: block; margin-bottom: 5px; }

        input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #e1e1e1; 
            border-radius: 10px; 
            box-sizing: border-box; 
            transition: border 0.3s;
        }

        input:focus { border-color: #667eea; outline: none; }

        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(to right, #ff7e5f, #feb47b); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.02); }

        .result { 
            margin-top: 20px; 
            padding: 20px; 
            border-radius: 15px; 
            background: #fff3e0; 
            border-left: 6px solid #ff9800;
            text-align: center;
            color: #d84315;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Make sure you have an image at static/bank-banner.jpg -->
        <img src="http://googleusercontent.com/image_collection/image_retrieval/4535475315800125798" alt="Bank" class="header-img">
        
        <h2>Bank Churn Predictor</h2>

        <form action="/" method="POST">
            <div class="form-group">
                <label>Complain (0=No, 1=Yes):</label>
                <input type="number" name="query1" value="{{query1 or ''}}" required>
            </div>
            <div class="form-group">
                <label>Age:</label>
                <input type="number" name="query2" value="{{query2 or ''}}" required>
            </div>
            <div class="form-group">
                <label>Number of Products:</label>
                <input type="number" name="query3" value="{{query3 or ''}}" required>
            </div>
            <div class="form-group">
                <label>Balance:</label>
                <input type="number" step="0.01" name="query4" value="{{query4 or ''}}" required>
            </div>
            <div class="form-group">
                <label>Is Active Member (0=No, 1=Yes):</label>
                <input type="number" name="query5" value="{{query5 or ''}}" required>
            </div>
            <button type="submit">Predict Outcome</button>
        </form>

        {% if output1 %}
        <div class="result">
            <p style="font-weight: bold; font-size: 1.2rem; margin: 0;">{{ output1 }}</p>
            <p style="margin: 5px 0 0 0;">{{ output2 }}</p>
        </div>
        {% endif %}
    </div>

</body>
</html>
